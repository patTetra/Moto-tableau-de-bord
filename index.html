<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Moto Dash & GPX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* MODE JOUR PAR DÉFAUT */
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --accent-color: #007aff;
            --text-color: #000000;
            --text-muted: #8e8e93;
            --map-invert: invert(0%) hue-rotate(0deg);
            --arrow-color: #ff3b30; 
            --gpx-color: #0055ff;   
        }

        /* AUTO-BASCULEMENT EN MODE SOMBRE VIA LES RÉGLAGES IPHONE */
        @media (prefers-color-scheme: dark) {
            :root:not(.force-light) {
                --bg-color: #0a0a0a;
                --card-bg: #16161a;
                --accent-color: #00ff66; 
                --text-color: #ffffff;
                --text-muted: #8e8e93;
                --map-invert: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
                --arrow-color: #00ff66; 
                --gpx-color: #00ccff;   
            }
        }

        /* FORCE LE MODE SOMBRE MANUELLEMENT */
        :root.force-dark {
            --bg-color: #0a0a0a;
            --card-bg: #16161a;
            --accent-color: #00ff66;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --map-invert: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
            --arrow-color: #00ff66;
            --gpx-color: #00ccff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 10px) 10px;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Top Dash */
        .top-dash {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 10px;
            height: 140px;
            margin-bottom: 10px;
        }

        .speed-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .speed-value {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            color: var(--accent-color);
            font-variant-numeric: tabular-nums;
        }

        .speed-unit {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .stats-stack {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
        }

        .mini-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .mini-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .mini-value {
            font-size: 1.4rem;
            font-weight: 600;
        }

        /* Conteneur Carte */
        #map-container {
            flex: 1;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #e5e5ea;
            z-index: 1;
            transition: transform 0.2s ease-out;
        }

        .leaflet-layer {
            filter: var(--map-invert);
        }

        /* Boutons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 5px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-gray { background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--text-muted); }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }

        #gpx-file { display: none; }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center; z-index: 100;
        }

        #overlay button {
            background: #007aff; color: white; border: none;
            padding: 15px 30px; border-radius: 30px; font-size: 1.2rem; font-weight: bold; margin-top: 20px;
        }

        .leaflet-control-zoom { display: none; }

        .custom-arrow-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arrow-marker {
            width: 0;
            height: 0;
            border-left: 14px solid transparent;  
            border-right: 14px solid transparent; 
            border-bottom: 38px solid var(--arrow-color); 
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5)) drop-shadow(0px 0px 1px #fff); 
            transition: transform 0.1s linear, border-bottom-color 0.3s;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Moto Dash & GPX</h2>
        <p style="margin-top: 15px; color: var(--text-muted);">L'accès GPS est nécessaire pour exploiter le compteur, le cap et la carte.</p>
        <button onclick="startApp()">Activer le GPS</button>
    </div>

    <div class="top-dash">
        <div class="speed-card">
            <div id="speed" class="speed-value">0</div>
            <div class="speed-unit">km/h</div>
        </div>
        <div class="stats-stack">
            <div class="mini-card">
                <div class="mini-label">Parcouru</div>
                <div><span id="distance" class="mini-value">0.0</span> <span style="font-size:0.8rem; color:var(--text-muted);">km</span></div>
            </div>
            <div class="mini-card">
                <div class="mini-label">Autonomie</div>
                <div><span id="range" class="mini-value">170</span> <span style="font-size:0.8rem; color:var(--text-muted);">km restants</span></div>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="controls">
        <button class="btn btn-gray" onclick="showResetMenu()">Reset</button>
        <button class="btn btn-green" onclick="triggerGpxUpload()">Charger GPX</button>
        <button class="btn btn-blue" onclick="recenterMap()">Recentrer</button>
    </div>

    <input type="file" id="gpx-file" accept=".gpx" onchange="handleGpxFile(event)">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const AUTONOMIE_MAX = 170; // Calibré sur ton test réel (145km à 84% consommés)
        let totalDistance = 0; 
        let currentRange = AUTONOMIE_MAX; 
        let lastPosition = null;
        let watchId = null;
        
        let map = null;
        let marker = null;
        let gpxLayer = null; 
        let gpxPoints = []; 
        
        let autoCenter = true;
        let autoCenterTimeout = null;
        let currentHeading = 0;

        if (localStorage.getItem('moto_theme')) {
            document.documentElement.className = localStorage.getItem('moto_theme');
        }

        if (localStorage.getItem('moto_distance')) {
            totalDistance = parseFloat(localStorage.getItem('moto_distance'));
        }
        if (localStorage.getItem('moto_current_range')) {
            currentRange = parseFloat(localStorage.getItem('moto_current_range'));
        }
        
        updateUI(0, totalDistance);

        function initMap() {
            map = L.map('map', { zoomControl: false, inertia: false }).setView([46.2276, 2.2137], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            const arrowIcon = L.divIcon({
                className: 'custom-arrow-container',
                html: '<div id="moto-arrow" class="arrow-marker"></div>',
                iconSize: [28, 38],
                iconAnchor: [14, 24] 
            });

            marker = L.marker([0, 0], { icon: arrowIcon }).addTo(map);

            map.on('dragstart zoomstart', () => { 
                autoCenter = false; 
                clearTimeout(autoCenterTimeout);
                rotateMap(0); 
                autoCenterTimeout = setTimeout(() => { autoCenter = true; }, 6000);
            });

            if (localStorage.getItem('moto_gpx_data')) {
                parseAndDrawGpx(localStorage.getItem('moto_gpx_data'), false);
            }
        }

        function startApp() {
            if ("geolocation" in navigator) {
                document.getElementById('overlay').style.display = 'none';
                initMap();
                watchId = navigator.geolocation.watchPosition(updatePosition, handleError, { 
                    enableHighAccuracy: true, timeout: 10000, maximumAge: 0 
                });
                if (navigator.wakeLock) navigator.wakeLock.request('screen').catch(() => {});
            }
        }

        function rotateMap(heading) {
            const mapEl = document.getElementById('map');
            const arrowEl = document.getElementById('moto-arrow');
            
            if (autoCenter && heading !== null && heading !== undefined) {
                mapEl.style.transform = `rotate(${-heading}deg)`;
                if (arrowEl) arrowEl.style.transform = `rotate(${heading}deg)`;
            } else {
                mapEl.style.transform = `rotate(0deg)`;
                if (arrowEl) arrowEl.style.transform = `rotate(${currentHeading}deg)`;
            }
        }

        function updatePosition(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            let speedKmh = 0;

            if (position.coords.speed !== null && position.coords.speed > 0) {
                speedKmh = Math.round(position.coords.speed * 3.6);
            }

            if (position.coords.heading !== null && !isNaN(position.coords.heading) && speedKmh > 5) {
                currentHeading = position.coords.heading;
            }

            if (map) {
                marker.setLatLng([lat, lon]);
                if (autoCenter) {
                    map.setView([lat, lon], 16);
                    rotateMap(currentHeading);
                }
                if (gpxPoints.length > 0) {
                    cleanPassedGpxPoints(lat, lon);
                }
            }

            if (lastPosition) {
                let dist = calculateDistance(lastPosition.coords.latitude, lastPosition.coords.longitude, lat, lon);
                
                if (speedKmh > 2 || dist > 0.005) { 
                    totalDistance += dist;
                    
                    // CALCUL DE LA CONSOMMATION DYNAMIQUE CALIBRÉ POUR LA REZON BOHEMIA
                    let penaltyFactor = 1.0;
                    if (speedKmh < 40) {
                        penaltyFactor = 0.80;  // Ville / Mode Éco tranquille
                    } else if (speedKmh >= 40 && speedKmh < 80) {
                        penaltyFactor = 1.00;  // Départementale / Mode Confort (Nominal)
                    } else if (speedKmh >= 80 && speedKmh < 95) {
                        penaltyFactor = 1.25;  // Voie rapide intermédiaire
                    } else if (speedKmh >= 95) {
                        penaltyFactor = 1.85;  // Voie rapide 110 km/h / Mode Sport (Résistance air max)
                    }

                    // Déduction pondérée de l'autonomie restante
                    currentRange -= (dist * penaltyFactor);
                    if (currentRange < 0) currentRange = 0;

                    localStorage.setItem('moto_distance', totalDistance);
                    localStorage.setItem('moto_current_range', currentRange);
                }
            }
            
            lastPosition = position;
            updateUI(speedKmh, totalDistance);
        }

        function triggerGpxUpload() { document.getElementById('gpx-file').click(); }

        function handleGpxFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const gpxText = e.target.result;
                localStorage.setItem('moto_gpx_data', gpxText); 
                parseAndDrawGpx(gpxText, true);
            };
            reader.readAsText(file);
        }

        function parseAndDrawGpx(xmlText, fitBounds) {
            try {
                if (gpxLayer) map.removeLayer(gpxLayer);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const trkpts = xmlDoc.getElementsByTagName("trkpt");
                gpxPoints = [];

                for (let i = 0; i < trkpts.length; i++) {
                    let lat = parseFloat(trkpts[i].getAttribute("lat"));
                    let lon = parseFloat(trkpts[i].getAttribute("lon"));
                    if (!isNaN(lat) && !isNaN(lon)) gpxPoints.push([lat, lon]);
                }

                drawGpxPolyline(fitBounds);
            } catch (err) {}
        }

        function drawGpxPolyline(fitBounds) {
            if (gpxPoints.length > 0) {
                if (gpxLayer) map.removeLayer(gpxLayer);
                const strokeColor = getComputedStyle(document.documentElement).getPropertyValue('--gpx-color').trim();
                gpxLayer = L.polyline(gpxPoints, {color: strokeColor, weight: 7, opacity: 0.85}).addTo(map);
                
                if (fitBounds) {
                    autoCenter = false; rotateMap(0);
                    map.fitBounds(gpxLayer.getBounds());
                    clearTimeout(autoCenterTimeout);
                    autoCenterTimeout = setTimeout(() => { autoCenter = true; }, 8000);
                }
            } else if (gpxLayer) {
                map.removeLayer(gpxLayer);
            }
        }

        function cleanPassedGpxPoints(currentLat, currentLon) {
            if (gpxPoints.length === 0) return;
            let closestIndex = -1;
            let minDistance = Infinity;

            for (let i = 0; i < gpxPoints.length; i++) {
                let dist = calculateDistance(currentLat, currentLon, gpxPoints[i][0], gpxPoints[i][1]);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestIndex = i;
                }
            }

            if (closestIndex > 0 && minDistance < 0.150) {
                gpxPoints.splice(0, closestIndex); 
                drawGpxPolyline(false);            
            }
        }

        function recenterMap() {
            autoCenter = true;
            if (lastPosition) {
                map.setView([lastPosition.coords.latitude, lastPosition.coords.longitude], 16);
                rotateMap(currentHeading);
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            let dLat = (lat2 - lat1) * Math.PI / 180; let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function updateUI(speed, distance) {
            document.getElementById('speed').innerText = speed;
            document.getElementById('distance').innerText = distance.toFixed(1);
            
            document.getElementById('range').innerText = Math.round(currentRange);
            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
            document.getElementById('range').style.color = (currentRange < 30) ? '#ff3b30' : textColor;
        }

        function showResetMenu() {
            let choix = prompt(
                "Options :\n\n" +
                "1 : Remettre à zéro (Plein)\n" +
                "2 : Saisir le % de batterie\n" +
                "3 : Supprimer le tracé GPX\n" +
                "4 : Mode d'affichage (Auto / Jour / Nuit)\n\n" +
                "Entrez un chiffre :", "1"
            );

            if (choix === "1") {
                currentRange = AUTONOMIE_MAX; totalDistance = 0; saveAndRefresh();
            } else if (choix === "2") {
                let inputPercent = prompt("Pourcentage (0-100) :", "100");
                if (inputPercent !== null) {
                    let percentage = parseInt(inputPercent, 10);
                    if (!isNaN(percentage) && percentage >= 0 && percentage <= 100) {
                        currentRange = (percentage / 100) * AUTONOMIE_MAX; totalDistance = 0; saveAndRefresh();
                    }
                }
            } else if (choix === "3") {
                gpxPoints = [];
                if (gpxLayer) map.removeLayer(gpxLayer);
                localStorage.removeItem('moto_gpx_data');
            } else if (choix === "4") {
                let themeChoice = prompt("Thème :\n1 = Automatique (iOS)\n2 = Jour forcé\n3 = Nuit forcé", "1");
                if (themeChoice === "1") {
                    document.documentElement.className = ""; localStorage.removeItem('moto_theme');
                } else if (themeChoice === "2") {
                    document.documentElement.className = "force-light"; localStorage.setItem('moto_theme', 'force-light');
                } else if (themeChoice === "3") {
                    document.documentElement.className = "force-dark"; localStorage.setItem('moto_theme', 'force-dark');
                }
                if (localStorage.getItem('moto_gpx_data')) parseAndDrawGpx(localStorage.getItem('moto_gpx_data'), false);
                updateUI(0, totalDistance);
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('moto_current_range', currentRange);
            localStorage.setItem('moto_distance', totalDistance);
            lastPosition = null;
            updateUI(0, totalDistance);
        }

        function handleError(error) { console.warn(`GPS Error: ${error.message}`); }
    </script>
</body>
</html>
