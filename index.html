<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Moto Dash & GPX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ... (Votre CSS original conservé) ... */
        :root { --bg-color: #f2f2f7; --card-bg: #ffffff; --accent-color: #007aff; --text-color: #000000; --text-muted: #8e8e93; --map-invert: invert(0%) hue-rotate(0deg); --arrow-color: #ff3b30; --gpx-color: #0055ff; --modal-bg: rgba(255, 255, 255, 0.95); --search-bg: #ffffff; --search-border: rgba(0,0,0,0.1); }
        @media (prefers-color-scheme: dark) { :root:not(.force-light) { --bg-color: #0a0a0a; --card-bg: #16161a; --accent-color: #00ff66; --text-color: #ffffff; --text-muted: #8e8e93; --map-invert: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); --arrow-color: #00ff66; --gpx-color: #00ccff; --modal-bg: rgba(22, 22, 26, 0.95); --search-bg: #1c1c1e; --search-border: rgba(255,255,255,0.1); } }
        /* ... (Fin CSS original) ... */

        /* NOUVEAU CSS POUR LE MENU ET INFOS */
        #route-info-bar { background: var(--card-bg); border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #map-menu { position: absolute; z-index: 1000; background: var(--modal-bg); border-radius: 12px; padding: 5px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: none; flex-direction: column; }
        .map-menu-btn { border: none; background: none; padding: 12px; font-weight: 600; text-align: left; cursor: pointer; }
    </style>
</head>
<body>

    <div id="route-info-bar">Trajet : 0 km</div>
    
    <div id="map-container">
        <div id="map-menu">
            <button class="map-menu-btn" onclick="addWp()">➕ Ajouter étape</button>
            <button class="map-menu-btn" onclick="setDest()">🏁 Destination</button>
        </div>
        <div id="map"></div>
    </div>
    <script>
        // --- VOS VARIABLES ORIGINALES + NOUVELLES ---
        let waypoints = [];
        let targetCoords = null;
        let waypointMarkers = [];
        let lastClickedLatLng = null;

        // --- DANS initMap() : Ajoutez l'écouteur contextmenu ---
        map.on('contextmenu', (e) => {
            lastClickedLatLng = e.latlng;
            const menu = document.getElementById('map-menu');
            menu.style.display = 'flex';
            menu.style.left = (e.containerPoint.x + 10) + 'px';
            menu.style.top = (e.containerPoint.y + 10) + 'px';
        });

        // --- NOUVELLES FONCTIONS ---
        function addWp() {
            waypoints.push({lat: lastClickedLatLng.lat, lon: lastClickedLatLng.lng});
            document.getElementById('map-menu').style.display = 'none';
            executeSilentRecalculate(lastPosition.coords.latitude, lastPosition.coords.longitude, false);
        }

        function setDest() {
            targetCoords = {lat: lastClickedLatLng.lat, lon: lastClickedLatLng.lng};
            document.getElementById('map-menu').style.display = 'none';
            executeSilentRecalculate(lastPosition.coords.latitude, lastPosition.coords.longitude, true);
        }

        function updateWaypointMarkers() {
            waypointMarkers.forEach(m => map.removeLayer(m));
            waypoints.forEach(w => waypointMarkers.push(L.circleMarker([w.lat, w.lon], {color:'#007aff', radius:8}).addTo(map)));
            if(targetCoords) waypointMarkers.push(L.marker([targetCoords.lat, targetCoords.lon]).addTo(map));
        }

        // --- MODIFICATION DANS executeSilentRecalculate() ---
        // Ajoutez en fin de fonction :
        // updateWaypointMarkers();

        // --- MODIFICATION DANS updateUI() ---
        // Ajoutez :
        // document.getElementById('route-info-bar').innerText = `Total: ${totalDistance.toFixed(1)} km`;

        // ... (Le reste de votre code original est conservé ici) ...
    </script>
</body>
</html>
