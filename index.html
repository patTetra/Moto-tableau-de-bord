<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moto Dash & GPX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #f2f2f7; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 10px; 
            padding-bottom: env(safe-area-inset-bottom);
            margin: 0;
            overflow: hidden; 
        }
        .top-dash { display: grid; grid-template-columns: 1fr 1.1fr 0.9fr; gap: 10px; height: 130px; margin-bottom: 10px; flex-shrink: 0; }
        .speed-card { background: #fff; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .speed-value { font-size: 3.5rem; font-weight: 800; color: #007aff; }
        .mini-card { background: #fff; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; padding-left: 12px; }
        .mini-label { font-size: 0.7rem; color: #8e8e93; text-transform: uppercase; }
        .mini-value { font-size: 1.1rem; font-weight: 600; }
        #map-container { flex: 1; min-height: 0; border-radius: 14px; overflow: hidden; position: relative; }
        #map { width: 100%; height: 100%; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; flex-shrink: 0; }
        .btn { border: none; border-radius: 10px; padding: 15px 5px; color: white; font-weight: 600; cursor: pointer; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="top-dash">
        <div class="speed-card">
            <div id="speed" class="speed-value">0</div>
            <div class="speed-unit">km/h</div>
        </div>
        <div class="stats-stack" style="display:grid; gap:10px">
            <div class="mini-card">
                <div class="mini-label">Prochaine étape</div>
                <div id="next-instruction" class="mini-value">--</div>
            </div>
            <div class="mini-card">
                <div class="mini-label">Autonomie</div>
                <div id="range" class="mini-value">170 km</div>
            </div>
        </div>
        <div class="stats-stack" style="display:grid; gap:10px">
            <div class="mini-card">
                <div class="mini-label">Arrivée</div>
                <div id="eta-time" class="mini-value">--:--</div>
            </div>
            <div class="mini-card">
                <div class="mini-label">Trajet restant</div>
                <div id="eta-duration" class="mini-value">--</div>
            </div>
        </div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <div class="controls">
        <button class="btn" style="background:#34c759" onclick="alert('Charger GPX')">📁 GPX</button>
        <button class="btn" style="background:#ff9500" onclick="handleRouteBtnClick()">🔍 Direct</button>
        <button class="btn" style="background:#8e8e93" onclick="alert('Options')">⚙️</button>
        <button class="btn" style="background:#007aff" onclick="recenterMap()">🎯</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, autoCenter = true, pressTimer = null;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([46.2276, 2.2137], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([46.2276, 2.2137]).addTo(map);

            // Gestion appui long iPhone
            map.on('touchstart', (e) => {
                pressTimer = setTimeout(() => handleLongPress(e.latlng), 1000);
            });
            map.on('touchend touchmove', () => { clearTimeout(pressTimer); });

            // Désactiver autoCenter dès qu'on déplace la carte
            map.on('movestart', () => { autoCenter = false; });
        }

        function handleLongPress(latlng) {
            autoCenter = false;
            if (confirm("Définir ce point comme destination ?")) {
                alert("Destination définie à : " + latlng.lat.toFixed(4));
            }
        }

        function updatePosition(position) {
            let lat = position.coords.latitude, lon = position.coords.longitude;
            marker.setLatLng([lat, lon]);
            if (autoCenter) map.setView([lat, lon], 16);
            document.getElementById('speed').innerText = Math.round(position.coords.speed * 3.6 || 0);
        }

        function recenterMap() {
            autoCenter = true;
            map.setView(marker.getLatLng(), 16);
        }

        function handleRouteBtnClick() {
            autoCenter = false;
            alert("Mode libre activé. Naviguez sur la carte.");
        }

        initMap();
        navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
