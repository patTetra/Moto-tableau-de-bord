<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto Dash & GPX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ... (Gardez vos styles CSS intacts) ... */
        body { font-family: -apple-system, sans-serif; background-color: #f2f2f7; height: 100vh; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
        .top-dash { display: grid; grid-template-columns: 1fr 1.1fr 0.9fr; gap: 10px; height: 130px; margin-bottom: 10px; }
        .speed-card { background: #fff; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .speed-value { font-size: 3.5rem; font-weight: 800; color: #007aff; }
        .mini-card { background: #fff; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; padding-left: 12px; }
        .mini-label { font-size: 0.7rem; color: #8e8e93; text-transform: uppercase; }
        .mini-value { font-size: 1.1rem; font-weight: 600; }
        #map-container { flex: 1; border-radius: 14px; overflow: hidden; position: relative; }
        #map { width: 100%; height: 100%; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; padding: 12px; color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-dash">
        <div class="speed-card">
            <div id="speed" class="speed-value">0</div>
            <div class="speed-unit">km/h</div>
        </div>
        <div class="stats-stack">
            <div class="mini-card">
                <div class="mini-label">Prochaine étape</div>
                <div id="next-instruction" class="mini-value">--</div>
            </div>
            <div class="mini-card">
                <div class="mini-label">Autonomie</div>
                <div id="range" class="mini-value">170 km</div>
            </div>
        </div>
        <div class="stats-stack">
            <div class="mini-card">
                <div class="mini-label">Arrivée</div>
                <div id="eta-time" class="mini-value">--:--</div>
            </div>
            <div class="mini-card">
                <div class="mini-label">Trajet restant</div>
                <div id="eta-duration" class="mini-value">--</div>
            </div>
        </div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <div class="controls">
        <button class="btn" style="background:#34c759" onclick="triggerGpxUpload()">📁 GPX</button>
        <button class="btn" style="background:#ff9500" onclick="handleRouteBtnClick()">🔍 Direct</button>
        <button class="btn" style="background:#8e8e93" onclick="openModal()">⚙️</button>
        <button class="btn" style="background:#007aff" onclick="recenterMap()">🎯</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, autoCenter = true, gpxPoints = [], navigationSteps = [], targetCoords = null, pressTimer = null;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([46.2276, 2.2137], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([46.2276, 2.2137]).addTo(map);

            // Gestion de l'appui long pour destination
            map.on('mousedown', (e) => { pressTimer = setTimeout(() => handleLongPress(e.latlng), 1000); });
            map.on('mouseup mousemove', () => clearTimeout(pressTimer));
            
            // Désactiver le suivi si on bouge la carte manuellement
            map.on('movestart', () => { autoCenter = false; });
        }

        function handleLongPress(latlng) {
            autoCenter = false;
            if (confirm("Définir ce point comme destination ?")) {
                targetCoords = { lat: latlng.lat, lon: latlng.lng };
                // Appel ici à votre fonction de calcul de route (ex: executeSilentRecalculate)
                alert("Destination définie !"); 
            }
        }

        function updatePosition(position) {
            let lat = position.coords.latitude, lon = position.coords.longitude;
            marker.setLatLng([lat, lon]);
            if (autoCenter) map.setView([lat, lon], 16);
            updateNextInstruction(lat, lon);
            document.getElementById('speed').innerText = Math.round(position.coords.speed * 3.6 || 0);
        }

        function updateNextInstruction(lat, lon) {
            if (navigationSteps.length > 0) {
                let step = navigationSteps[0];
                document.getElementById('next-instruction').innerText = step.instruction;
            }
        }

        function recenterMap() {
            autoCenter = true;
            map.setView(marker.getLatLng(), 16);
        }

        function handleRouteBtnClick() {
            autoCenter = false;
            alert("Mode recherche activé - Vous pouvez maintenant naviguer sur la carte.");
        }

        // Démarrage
        initMap();
        navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
