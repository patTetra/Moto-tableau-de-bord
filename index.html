<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Moto Dash</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #16161a;
            --accent-color: #00ff66;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 20px) 20px;
            overflow: hidden;
        }

        /* Section Vitesse */
        .speed-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .speed-value {
            font-size: 32vw;
            font-weight: 700;
            line-height: 0.9;
            color: var(--accent-color);
            font-variant-numeric: tabular-nums;
        }

        .speed-unit {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Section Autonomie / Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 2.2rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Bouton de configuration de la batterie */
        .btn-battery {
            background-color: #242429;
            color: white;
            border: 1px solid #3a3a4c;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s;
        }

        .btn-battery:active {
            background-color: #3a3a4c;
        }

        /* Overlay d'erreur/permission */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            z-index: 100;
        }

        #overlay button {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Moto Dash</h2>
        <p style="margin-top: 15px; color: var(--text-muted);">Cette application nécessite l'accès à votre position GPS pour calculer la vitesse et la distance.</p>
        <button onclick="startApp()">Activer le GPS</button>
    </div>

    <div class="speed-container">
        <div id="speed" class="speed-value">0</div>
        <div class="speed-unit">km/h</div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <div class="card-label">Parcouru</div>
            <div id="distance" class="card-value">0.0</div>
            <div style="font-size: 0.8rem; color: var(--text-muted);">km</div>
        </div>
        <div class="card">
            <div class="card-label">Autonomie</div>
            <div id="range" class="card-value">150</div>
            <div style="font-size: 0.8rem; color: var(--text-muted);">km restants</div>
        </div>
    </div>

    <button class="btn-battery" onclick="setBatteryPercentage()">Ajuster Batterie (%)</button>

    <script>
        const AUTONOMIE_MAX = 150; // Autonomie max à 100% de batterie
        let totalDistance = 0; // Distance accumulée sur ce cycle
        let startingRange = AUTONOMIE_MAX; // Autonomie de départ définie par l'utilisateur
        let lastPosition = null;
        let watchId = null;

        // Charger les données sauvegardées au redémarrage de l'app
        if (localStorage.getItem('moto_distance')) {
            totalDistance = parseFloat(localStorage.getItem('moto_distance'));
        }
        if (localStorage.getItem('moto_starting_range')) {
            startingRange = parseFloat(localStorage.getItem('moto_starting_range'));
        }
        
        // Premier affichage au chargement
        updateUI(0, totalDistance);

        function startApp() {
            if ("geolocation" in navigator) {
                document.getElementById('overlay').style.display = 'none';
                
                watchId = navigator.geolocation.watchPosition(
                    updatePosition, 
                    handleError, 
                    {
                        enableHighAccuracy: true,
                        timeout: 5000,
                        maximumAge: 0
                    }
                );
                
                if (navigator.wakeLock) {
                    navigator.wakeLock.request('screen').catch(err => console.log("WakeLock refusé"));
                }
            } else {
                alert("Le GPS n'est pas supporté par votre appareil.");
            }
        }

        function updatePosition(position) {
            let speedKmh = 0;
            if (position.coords.speed !== null && position.coords.speed > 0) {
                speedKmh = Math.round(position.coords.speed * 3.6);
            }

            if (lastPosition) {
                let dist = calculateDistance(
                    lastPosition.coords.latitude, 
                    lastPosition.coords.longitude,
                    position.coords.latitude, 
                    position.coords.longitude
                );
                
                // Filtrer les imprécisions GPS à l'arrêt
                if (speedKmh > 2 || dist > 0.005) { 
                    totalDistance += dist;
                    localStorage.setItem('moto_distance', totalDistance);
                }
            }
            
            lastPosition = position;
            updateUI(speedKmh, totalDistance);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            let dLat = (lat2 - lat1) * Math.PI / 180;
            let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function updateUI(speed, distance) {
            document.getElementById('speed').innerText = speed;
            document.getElementById('distance').innerText = distance.toFixed(1);
            
            // L'autonomie restante est l'autonomie initialement configurée MOINS les kilomètres parcourus depuis
            let rangeRemaining = startingRange - distance;
            if (rangeRemaining < 0) rangeRemaining = 0;
            
            document.getElementById('range').innerText = Math.round(rangeRemaining);
            
            if (rangeRemaining < 30) {
                document.getElementById('range').style.color = '#ff3b30'; // Rouge sous 30km
            } else {
                document.getElementById('range').style.color = '#ffffff';
            }
        }

        function setBatteryPercentage() {
            // Demande le pourcentage à l'utilisateur
            let input = prompt("Entrez le pourcentage de batterie actuel (0 à 100) :", "100");
            
            if (input !== null) {
                let percentage = parseInt(input, 10);
                
                if (!isNaN(percentage) && percentage >= 0 && percentage <= 100) {
                    // Calcul de la nouvelle autonomie théorique de départ
                    startingRange = (percentage / 100) * AUTONOMIE_MAX;
                    // On remet la distance parcourue à zéro pour ce nouveau cycle
                    totalDistance = 0; 
                    
                    // Sauvegarde locale
                    localStorage.setItem('moto_starting_range', startingRange);
                    localStorage.setItem('moto_distance', totalDistance);
                    
                    // Réinitialisation du dernier point GPS pour éviter les sauts de distance
                    lastPosition = null;
                    
                    // Mise à jour immédiate de l'écran
                    updateUI(0, totalDistance);
                } else {
                    alert("Veuillez entrer un nombre valide entre 0 et 100.");
                }
            }
        }

        function handleError(error) {
            console.warn(`Erreur GPS (${error.code}): ${error.message}`);
        }
    </script>
</body>
</html>
