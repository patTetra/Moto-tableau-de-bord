<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moto Dash & GPX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-color: #f2f2f7; --card-bg: #ffffff; --accent-color: #007aff; --text-color: #000000; --text-muted: #8e8e93; --search-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
        .top-dash { display: grid; grid-template-columns: 1fr 1.1fr 0.9fr; gap: 10px; height: 130px; margin-bottom: 10px; }
        .speed-card { background-color: var(--card-bg); border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .speed-value { font-size: 3.5rem; font-weight: 800; color: var(--accent-color); }
        .stats-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 10px; }
        .mini-card { background-color: var(--card-bg); border-radius: 14px; padding-left: 12px; display: flex; flex-direction: column; justify-content: center; }
        .mini-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .mini-value { font-size: 1.25rem; font-weight: 600; }
        #map-container { flex: 1; position: relative; border-radius: 14px; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .search-overlay-bar { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; }
        .search-input-wrapper { display: none; background: var(--search-bg); border-radius: 12px; height: 50px; align-items: center; }
        .search-input-wrapper.active { display: flex; }
        .search-input-wrapper input { flex: 1; border: none; padding: 0 15px; background: transparent; height: 100%; }
        .search-results-box { background: var(--search-bg); border-radius: 12px; margin-top: 5px; display: none; max-height: 200px; overflow-y: auto; }
        .search-results-box.active { display: block; }
        .search-item { padding: 14px 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600; cursor: pointer; text-align: center; }
        #overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Moto Dash & GPX</h2>
        <button onclick="startApp()">Activer le GPS</button>
    </div>

    <div class="top-dash">
        <div class="speed-card">
            <div id="speed" class="speed-value">0</div>
            <div class="speed-unit">km/h</div>
        </div>
        <div class="stats-stack">
            <div class="mini-card">
                <div class="mini-label">Parcouru</div>
                <div><span id="distance" class="mini-value">0.0</span> km</div>
            </div>
            <div class="mini-card">
                <div id="range-label" class="mini-label">Autonomie</div>
                <div><span id="range" class="mini-value">170</span> km restants</div>
            </div>
        </div>
        <div class="stats-stack">
            <div class="mini-card">
                <div class="mini-label">Arrivée</div>
                <div id="eta-time" class="mini-value">--:--</div>
            </div>
            <div class="mini-card">
                <div class="mini-label">Restant</div>
                <div id="eta-duration" class="mini-value">--</div>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div class="search-overlay-bar">
            <div id="search-wrapper" class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="Où va-t-on ?" oninput="handleSearchTyping()">
                <button onclick="hideSearchField()" style="padding: 0 15px;">✕</button>
            </div>
            <div id="search-results" class="search-results-box"></div>
        </div>
        <div id="map"></div>
    </div>

    <div class="controls">
        <button class="btn" style="background:#34c759" onclick="triggerGpxUpload()">📁 Charger GPX</button>
        <button id="route-btn" class="btn" style="background:#ff9500" onclick="showSearchField()">🔍 Trajet Direct</button>
        <button class="btn" style="background:#8e8e93" onclick="alert('Options')">⚙️ Options</button>
        <button class="btn" style="background:#007aff" onclick="recenterMap()">🎯 Recentrer</button>
    </div>

    <input type="file" id="gpx-file" accept=".gpx" style="display:none">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, destinationMarker, autocompleteTimeout;

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            map = L.map('map', { zoomControl: false }).setView([48.57, -3.83], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
            
            // Interaction par clic sur la carte
            map.on('click', (e) => {
                setDestination(e.latlng.lat, e.latlng.lng, "Point choisi");
            });

            navigator.geolocation.watchPosition((pos) => {
                marker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            }, () => {}, { enableHighAccuracy: true });
        }

        function setDestination(lat, lon, name) {
            if (destinationMarker) map.removeLayer(destinationMarker);
            destinationMarker = L.marker([lat, lon]).addTo(map);
            map.setView([lat, lon], 14);
            hideSearchField();
        }

        function showSearchField() { document.getElementById('search-wrapper').classList.add('active'); }
        function hideSearchField() { document.getElementById('search-wrapper').classList.remove('active'); document.getElementById('search-results').classList.remove('active'); }

        function handleSearchTyping() {
            clearTimeout(autocompleteTimeout);
            const query = document.getElementById('search-input').value;
            if (query.length < 3) return;
            autocompleteTimeout = setTimeout(async () => {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
                const data = await res.json();
                const box = document.getElementById('search-results');
                box.innerHTML = '';
                if (data.length > 0) {
                    box.classList.add('active');
                    data.forEach(item => {
                        let div = document.createElement('div');
                        div.className = 'search-item';
                        div.innerText = item.display_name.split(',')[0];
                        div.onclick = () => { setDestination(item.lat, item.lon, item.display_name); };
                        box.appendChild(div);
                    });
                }
            }, 350);
        }

        function triggerGpxUpload() { document.getElementById('gpx-file').click(); }
        function recenterMap() { /* Logique de recentrage */ }
    </script>
</body>
</html>
